<script>
  function initMap() {
    const villa = { lat: 35.405466, lng: 24.252771 };
    const heraklion = { lat: 35.346518, lng: 25.136615 }

    const map = new google.maps.Map(document.getElementById("map"), {
      zoom: 8,
      center: heraklion,
      mapTypeId: 'terrain'
    });

    const marker = new google.maps.Marker({
      position: villa,
      map: map
    });
  };
</script>

<div id="map"></div>

<script
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDBYYN7oX42ZsTYEv-AvywyZj1-v3NJYmE&callback=initMap&libraries=&v=weekly"

></script>
