baseURL = "https://villadetara.com"
title = "Villa de Tara"
theme = "gokarna"
languageCode = "en"
defaultContentLanguage = "en"
enableEmoji = true
enableRobotsTXT = true

# Choose one of emacs, trac or perldoc
pygmentsStyle = "monokai"

[params]
  mainSections = ["posts", "reviews"]
  themeMode = "dark"
  accentColor = "#0d5eaf"
  footer = "The Marauders"
  description = "Kefalas, Crete"
  avatarURL = "/images/pool-view.jpeg"
  AvatarAltText = "avatar"
  avatarSize = "size-xl"
  customHeadHTML = """
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.css" integrity="sha384-Xi8rHCmBmhbuyyhbI88391ZKP2dmfnOl4rT9ZfRI7mLTdk1wblIUnrIq35nqwEvC" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.js" integrity="sha384-X/XCfMm41VSsqRNQgDerQczD69XqmjOOOwYQvr/uuC+j4OPoNhVgjdGFwhvN02Ja" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/contrib/auto-render.min.js" integrity="sha384-+XBljXPPiv+OzfbB3cVmLHf4hdUFHlWNZN5spNQ7rmHTXpd7WvJum6fIACpNNfIR" crossorigin="anonymous"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function() {
        renderMathInElement(document.body, {
          // customised options
          // • auto-render specific keys, e.g.:
          delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false},
          ],
          // • rendering keys, e.g.:
          throwOnError : false
        });
      });
    </script>
  """
  socialIcons = [
#    {name = "twitter", url = "https://example.com"},
#    {name = "linkedin", url = "https://example.com"},
#    {name = "stackoverflow", url = "https://example.com"},
#    {name = "dribbble", url = "https://example.com"},
#    {name = "instagram", url = "https://example.com"},
#    {name = "twitch", url = "https://example.com"},
#    {name = "email", url = "mailto:example@example.com"}
  ]
  metaKeywords = ["blog", "gokarna", "hugo"]
  togglePreviousAndNextButtons = "true"

[menu]
  [[menu.main]]
    name = "Home"
    pre = "<span data-feather='home'></span>"
    url = "/"
    weight = 10

  [[menu.main]]
    name = "Posts"
    pre = "<span data-feather='book'></span>"
    url = "/posts/"
    weight = 20

  [[menu.main]]
    name = "Tags"
    pre = "<span data-feather='tag'></span>"
    url = "/tags/"
    weight = 30


  [[menu.main]]
    name = "Reviews"
    pre = "<span data-feather='thumbs-up'></span>"
    url = "/reviews/"
    weight = 30

  [[menu.main]]
    name = "About"
    pre = "<span data-feather='info'></span>"
    url = "/about/"
    weight = 40

  [[menu.main]]
    name = "Location"
    pre = "<span data-feather='globe'></span>"
    url = "/where-we-are/"
    weight = 50

[Deployment]

  [[Deployment.targets]]
    name = "AWS S3"
    URL = "s3://villadetara.com?region=eu-west-2"
    cloudFrontDistributionID = "E33G0WVXUM35IK"
